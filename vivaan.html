<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivaan's Math Challenge! 🧠⚡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  :root{--bg:#0f0c29;--card:#1a1740;--accent:#f7c948;--green:#22d67a;--red:#ff5e5e;--blue:#4fc3f7;--purple:#b39ddb}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:white;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 15% 25%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 85% 15%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 45% 65%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 5% 85%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 95% 75%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 55% 45%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 30% 95%,rgba(255,255,255,.3) 0%,transparent 100%);pointer-events:none;z-index:0}
  .wrapper{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:20px 16px 60px}

  /* Header */
  .header{text-align:center;padding:28px 0 20px}
  .header .crown{font-size:48px;animation:bounce 1.6s infinite;display:block}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .header h1{font-size:clamp(26px,5vw,40px);font-weight:900;letter-spacing:-1px;line-height:1.1}
  .header h1 span{color:var(--accent)}
  .header p{margin-top:7px;font-size:14px;color:#b0aed0}

  /* Day tabs */
  .day-tabs{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:20px 0 16px}
  .day-tab{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:50px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:#b0aed0;white-space:nowrap;line-height:1.4}
  .day-tab:hover{background:rgba(247,201,72,.15);border-color:var(--accent);color:var(--accent)}
  .day-tab.active{background:var(--accent);border-color:var(--accent);color:#0f0c29}
  .day-tab.done{background:rgba(34,214,122,.15);border-color:var(--green);color:var(--green)}
  .day-tab.done.active{background:var(--green);color:#0f0c29}

  /* Main layout: sidebar + quiz */
  .page-layout{display:flex;gap:14px;align-items:flex-start}

  /* Progress sidebar */
  .progress-sidebar{flex-shrink:0;width:44px;display:flex;flex-direction:column;gap:5px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:12px 6px}
  .q-block{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:rgba(255,255,255,.3);transition:all .35s;cursor:default}
  .q-block.current{border-color:var(--accent);color:var(--accent);animation:qpulse 1.2s infinite;background:rgba(247,201,72,.12)}
  .q-block.correct{background:rgba(34,214,122,.25);border-color:var(--green);color:var(--green)}
  .q-block.wrong{background:rgba(255,94,94,.25);border-color:var(--red);color:var(--red)}
  @keyframes qpulse{0%,100%{box-shadow:0 0 0 0 rgba(247,201,72,.4)}50%{box-shadow:0 0 0 5px rgba(247,201,72,0)}}

  /* Quiz card */
  .quiz-area{flex:1;min-width:0}
  .quiz-card{background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:24px 20px;margin-bottom:20px}
  .day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .day-title{font-size:17px;font-weight:800;color:var(--accent)}
  .day-meta{font-size:12px;color:#8884b0}
  .live-score{display:inline-flex;align-items:center;gap:5px;background:rgba(34,214,122,.12);border:1px solid rgba(34,214,122,.3);border-radius:50px;padding:5px 12px;font-size:13px;font-weight:700;color:var(--green)}
  .progress-bar-wrap{background:rgba(255,255,255,.08);border-radius:50px;height:8px;margin-bottom:20px;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#ff9f43);border-radius:50px;transition:width .4s}
  .q-counter{font-size:11px;font-weight:700;color:#8884b0;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
  .question-text{font-size:clamp(16px,3.5vw,22px);font-weight:800;line-height:1.45;margin-bottom:20px;min-height:60px}
  .question-emoji{font-size:28px;display:block;margin-bottom:6px}

  /* Options */
  .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .opt-btn{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 10px;font-size:16px;font-weight:800;color:white;cursor:pointer;transition:all .2s;text-align:center;font-family:'Nunito',sans-serif}
  .opt-btn:hover:not(:disabled){background:rgba(247,201,72,.15);border-color:var(--accent);transform:scale(1.03)}
  .opt-btn.correct{background:rgba(34,214,122,.25);border-color:var(--green);color:var(--green)}
  .opt-btn.wrong{background:rgba(255,94,94,.2);border-color:var(--red);color:var(--red)}
  .opt-btn:disabled{cursor:not-allowed}

  /* Character reaction panel */
  .char-panel{display:none;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px 18px;margin-bottom:14px;align-items:center;gap:14px;animation:slideUp .35s ease}
  .char-panel.show{display:flex}
  @keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
  .char-avatar{font-size:52px;line-height:1;animation:charBounce .5s ease}
  @keyframes charBounce{0%{transform:scale(0.6)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
  .char-avatar.shake{animation:charShake .5s ease}
  @keyframes charShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
  .char-info{flex:1}
  .char-name{font-size:12px;font-weight:700;color:#8884b0;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
  .char-emotion{font-size:20px;font-weight:900}
  .char-emotion.correct-em{color:var(--green)}
  .char-emotion.wrong-em{color:var(--red)}
  .char-msg{font-size:13px;color:#b0aed0;margin-top:2px;font-weight:600}

  /* Feedback */
  .feedback{text-align:center;font-size:18px;font-weight:900;padding:10px 16px;border-radius:12px;margin-bottom:14px;display:none}
  .feedback.show{display:block;animation:popIn .3s}
  @keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
  .feedback.correct-fb{background:rgba(34,214,122,.15);color:var(--green)}
  .feedback.wrong-fb{background:rgba(255,94,94,.12);color:var(--red)}
  .next-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#ff9f43);color:#0f0c29;font-size:16px;font-weight:900;border:none;border-radius:14px;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .15s,box-shadow .15s;display:none}
  .next-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(247,201,72,.35)}
  .next-btn.show{display:block;animation:popIn .3s}

  /* Result */
  .result-screen{display:none;text-align:center;padding:10px 0}
  .result-screen.show{display:block;animation:popIn .4s}
  .result-trophy{font-size:68px;display:block;margin-bottom:10px}
  .result-score{font-size:52px;font-weight:900;color:var(--accent);line-height:1}
  .result-score span{font-size:20px;color:#b0aed0;font-weight:600}
  .result-stars{font-size:32px;letter-spacing:4px;margin:10px 0}
  .result-msg{font-size:18px;font-weight:700;margin-bottom:18px}
  .result-char{font-size:64px;animation:bounce 1s infinite;display:block;margin-bottom:8px}
  .restart-btn{background:linear-gradient(135deg,var(--blue),#7986cb);color:white;border:none;border-radius:14px;padding:12px 28px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .15s}
  .restart-btn:hover{transform:translateY(-2px)}

  /* History */
  .history-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:22px;margin-top:8px}
  .history-card h2{font-size:18px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:7px}
  .score-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 16px;margin-bottom:9px}
  .sr-date{font-size:13px;color:#b0aed0;font-weight:600}
  .sr-day-label{font-size:12px;color:#8884b0;margin-top:2px}
  .sr-score{font-size:20px;font-weight:900;color:var(--accent)}
  .sr-pct{font-size:11px;color:#8884b0}
  .sr-stars{font-size:16px;letter-spacing:2px}
  .score-row.perfect .sr-score{color:var(--green)}
  .history-empty{font-size:14px;color:#8884b0;text-align:center;padding:18px}

  /* Confetti */
  #confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}

  @media(max-width:560px){
    .page-layout{flex-direction:column}
    .progress-sidebar{width:100%;flex-direction:row;flex-wrap:wrap;padding:10px;gap:4px;justify-content:center}
    .q-block{width:28px;height:28px;font-size:9px;border-radius:6px}
    .options{grid-template-columns:1fr 1fr}
    .opt-btn{padding:12px 8px;font-size:14px}
    .quiz-card{padding:18px 14px}
  }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="wrapper">

  <div class="header">
    <span class="crown">👑</span>
    <h1>Vivaan's <span>Math Challenges!</span></h1>
    <p>7 days · 20 questions each · Tables 2–20 · Millions & Billions · Abacus 🚀</p>
  </div>

  <div class="day-tabs" id="dayTabs"></div>

  <div class="page-layout">
    <!-- Left progress blocks -->
    <div class="progress-sidebar" id="progressSidebar"></div>

    <!-- Quiz area -->
    <div class="quiz-area">
      <div class="quiz-card">
        <div class="day-header">
          <div>
            <div class="day-title" id="dayTitle"></div>
            <div class="day-meta" id="dayMeta"></div>
          </div>
          <div class="live-score">✅ <span id="liveScore">0</span> / 20</div>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

        <div id="quizBody">
          <div class="q-counter" id="qCounter">Question 1 of 20</div>
          <div class="question-text" id="questionText"></div>
          <div class="options" id="optionsGrid"></div>
          <div class="char-panel" id="charPanel">
            <div class="char-avatar" id="charAvatar"></div>
            <div class="char-info">
              <div class="char-name" id="charName"></div>
              <div class="char-emotion" id="charEmotion"></div>
              <div class="char-msg" id="charMsg"></div>
            </div>
          </div>
          <div class="feedback" id="feedback"></div>
          <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
        </div>

        <div class="result-screen" id="resultScreen">
          <span class="result-char" id="resChar"></span>
          <span class="result-trophy" id="resTrophy"></span>
          <div class="result-score"><span id="resScore">0</span><br><span>out of 20</span></div>
          <div class="result-stars" id="resStars"></div>
          <div class="result-msg" id="resMsg"></div>
          <button class="restart-btn" onclick="restartDay()">🔄 Try Again</button>
        </div>
      </div>

      <div class="history-card">
        <h2>📊 Score Board</h2>
        <div id="historyList"></div>
      </div>
    </div>
  </div>

</div>

const MONTH_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const DAY_TITLES=[
  "Tables 2–5 + Abacus Intro 🔢","Tables 6–10 + Place Value 🧮","Tables 11–15 + Millions & Billions 💰","Tables 16–20 + Word Problems 🦁","Division, Fractions & Patterns ➗","Time, Money & Measurement 📏","⚡ ULTIMATE BOSS LEVEL 🏆"
];

// ─── STATE ────────────────────────────────────────────────────
let currentDay=0,currentQ=0,score=0,answered=false;
let questionOrder=[];

// ─── STORAGE ─────────────────────────────────────────────────
function storageKey(i){return'vivaan2_score_'+dateKey(DATES[i]);}
function getScore(i){const v=localStorage.getItem(storageKey(i));return v!==null?parseInt(v):null;}
function saveScore(i,s){localStorage.setItem(storageKey(i),String(s));}

// ─── SHUFFLE ─────────────────────────────────────────────────
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ─── BUILD TABS ───────────────────────────────────────────────
function buildTabs(){
  const wrap=document.getElementById('dayTabs');wrap.innerHTML='';
  DATES.forEach((d,i)=>{
    const tab=document.createElement('button');
    const saved=getScore(i);
    tab.className='day-tab'+(i===currentDay?' active':'')+(saved!==null?' done':'');
    tab.innerHTML=`${i===0?'📅 ':''}${DAY_NAMES[d.getDay()].slice(0,3)}<br><small>${d.getDate()} ${MONTH_NAMES[d.getMonth()]}</small>`;
    tab.style.lineHeight='1.3';tab.onclick=()=>switchDay(i);wrap.appendChild(tab);
  });
}

// ─── BUILD PROGRESS BLOCKS ────────────────────────────────────
function buildProgressBlocks(){
  const sb=document.getElementById('progressSidebar');sb.innerHTML='';
  const qs=QUESTION_SETS[currentDay];
  qs.forEach((_,i)=>{
    const b=document.createElement('div');b.className='q-block';b.id='qb'+i;b.textContent=i+1;sb.appendChild(b);
  });
  updateProgressBlocks();
}

function updateProgressBlocks(){
  const qs=QUESTION_SETS[currentDay];
  qs.forEach((_,i)=>{
    const b=document.getElementById('qb'+i);if(!b)return;
    b.className='q-block';
    if(i<currentQ){
      // completed — we'd need to track per-question results
      const res=questionResults[i];
      if(res===true)b.classList.add('correct');
      else if(res===false)b.classList.add('wrong');
    } else if(i===currentQ){
      b.classList.add('current');
    }
  });
}

let questionResults=[];

// ─── SWITCH DAY ───────────────────────────────────────────────
function switchDay(idx){
  currentDay=idx;currentQ=0;score=0;answered=false;questionResults=[];
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizBody').style.display='';
  document.getElementById('liveScore').textContent='0';
  document.getElementById('charPanel').className='char-panel';
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='next-btn';
  buildTabs();buildProgressBlocks();renderQuestion();
}

// ─── RENDER QUESTION ──────────────────────────────────────────
function renderQuestion(){
  const qs=QUESTION_SETS[currentDay];
  const q=qs[currentQ];
  answered=false;
  document.getElementById('qCounter').textContent=`Question ${currentQ+1} of ${qs.length}`;
  document.getElementById('questionText').innerHTML=`<span class="question-emoji">${q.e}</span>${q.t}`;
  document.getElementById('progressBar').style.width=((currentQ/qs.length)*100)+'%';
  document.getElementById('charPanel').className='char-panel';
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='next-btn';

  // Shuffle options, track correct
  const correct=q.o[q.a];
  const shuffled=shuffle(q.o);
  const newCorrectIdx=shuffled.indexOf(correct);

  const grid=document.getElementById('optionsGrid');grid.innerHTML='';
  shuffled.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';btn.textContent=opt;btn.dataset.idx=i;
    btn.onclick=()=>checkAnswer(i,newCorrectIdx,correct);
    grid.appendChild(btn);
  });

  document.getElementById('dayTitle').textContent=`Day ${currentDay+1} — ${DAY_TITLES[currentDay]}`;
  document.getElementById('dayMeta').textContent=fmtDate(DATES[currentDay]);
  updateProgressBlocks();
}

// ─── CHECK ANSWER ─────────────────────────────────────────────
function checkAnswer(selected,correct,correctText){
  if(answered)return;answered=true;
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  btns[correct].classList.add('correct');
  const char=CHARS[currentDay];
  const isCorrect=selected===correct;

  if(isCorrect){
    score++;questionResults[currentQ]=true;
    document.getElementById('liveScore').textContent=score;
    btns[selected].classList.add('correct');
    const msg=char.happyMsgs[Math.floor(Math.random()*char.happyMsgs.length)];
    showChar(char.happy,char.name,char.happyEm,msg,true);
    const fb=document.getElementById('feedback');
    const celebrations=['🎉 Brilliant!','⚡ Superstar!','🔥 Nailed it!','🌟 Genius!','🚀 Correct!','💡 Smart!','✨ Perfect!'];
    fb.textContent=celebrations[Math.floor(Math.random()*celebrations.length)];
    fb.className='feedback correct-fb show';
  } else {
    questionResults[currentQ]=false;
    btns[selected].classList.add('wrong');
    const msg=char.sadMsgs[Math.floor(Math.random()*char.sadMsgs.length)];
    showChar(char.neutral,char.name,char.sadEm,msg,false);
    const fb=document.getElementById('feedback');
    fb.textContent=`❌ The answer was: ${correctText}`;
    fb.className='feedback wrong-fb show';
  }

  const qs=QUESTION_SETS[currentDay];
  const nb=document.getElementById('nextBtn');
  nb.className='next-btn show';
  nb.textContent=currentQ<qs.length-1?'Next Question →':'See My Score! 🏆';
  updateProgressBlocks();
}

// ─── SHOW CHARACTER ───────────────────────────────────────────
function showChar(emoji,name,emotion,msg,isCorrect){
  const panel=document.getElementById('charPanel');
  const av=document.getElementById('charAvatar');
  av.textContent=emoji;
  av.className='char-avatar'+(isCorrect?'':' shake');
  document.getElementById('charName').textContent=name+' says:';
  const em=document.getElementById('charEmotion');
  em.textContent=emotion;em.className='char-emotion'+(isCorrect?' correct-em':' wrong-em');
  document.getElementById('charMsg').textContent=msg;
  panel.className='char-panel show';
}

// ─── NEXT ─────────────────────────────────────────────────────
function nextQuestion(){
  currentQ++;
  if(currentQ>=QUESTION_SETS[currentDay].length)showResult();
  else renderQuestion();
}

// ─── RESULT ───────────────────────────────────────────────────
function showResult(){
  saveScore(currentDay,score);
  document.getElementById('quizBody').style.display='none';
  const rs=document.getElementById('resultScreen');rs.classList.add('show');
  document.getElementById('progressBar').style.width='100%';
  const pct=score/20;
  let trophy,msg,stars,charEmoji;
  if(score===20){trophy='🏆';msg='PERFECT! 100%! You are a Mathematics GOD! 🧠⚡';stars='⭐⭐⭐⭐⭐';charEmoji='🤩';}
  else if(pct>=.9){trophy='🥇';msg='Outstanding! Almost flawless! 🔥';stars='⭐⭐⭐⭐⭐';charEmoji='😄';}
  else if(pct>=.75){trophy='🥈';msg='Brilliant! Keep pushing, superstar! 💪';stars='⭐⭐⭐⭐';charEmoji='😊';}
  else if(pct>=.6){trophy='🥉';msg='Good effort! You are getting stronger! 📚';stars='⭐⭐⭐';charEmoji='😐';}
  else{trophy='💪';msg='Never give up! Try again and beat your score!';stars='⭐⭐';charEmoji='😤';}
  document.getElementById('resTrophy').textContent=trophy;
  document.getElementById('resChar').textContent=charEmoji;
  document.getElementById('resScore').textContent=score;
  document.getElementById('resStars').textContent=stars;
  document.getElementById('resMsg').textContent=msg;
  if(pct>=.9)launchConfetti();
  buildTabs();renderHistory();
}

// ─── RESTART ─────────────────────────────────────────────────
function restartDay(){
  currentQ=0;score=0;answered=false;questionResults=[];
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizBody').style.display='';
  document.getElementById('liveScore').textContent='0';
  buildProgressBlocks();renderQuestion();
}

// ─── HISTORY ─────────────────────────────────────────────────
function renderHistory(){
  const list=document.getElementById('historyList');let html='';let any=false;
  DATES.forEach((d,i)=>{
    const s=getScore(i);if(s===null)return;any=true;
    const pct=Math.round((s/20)*100);
    const stars=s===20?'⭐⭐⭐⭐⭐':s>=18?'⭐⭐⭐⭐⭐':s>=15?'⭐⭐⭐⭐':s>=12?'⭐⭐⭐':'⭐⭐';
    html+=`<div class="score-row${s===20?' perfect':''}"><div><div class="sr-date">${fmtDate(d)}</div><div class="sr-day-label">Day ${i+1} — ${DAY_NAMES[d.getDay()]}</div></div><div style="text-align:right"><div class="sr-score">${s}/20</div><div class="sr-pct">${pct}%</div><div class="sr-stars">${stars}</div></div></div>`;
  });
  list.innerHTML=any?html:'<div class="history-empty">No scores yet — finish a quiz to see results here! 🎯</div>';
}

// ─── CONFETTI ─────────────────────────────────────────────────
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=Array.from({length:150},()=>({x:Math.random()*canvas.width,y:Math.random()*-300,r:Math.random()*8+4,c:`hsl(${Math.random()*360},90%,60%)`,vx:(Math.random()-.5)*5,vy:Math.random()*5+2,rot:Math.random()*360,rv:(Math.random()-.5)*7}));
  let frame=0;
  function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);pieces.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.c;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;});frame++;if(frame<180)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);}
  draw();
}

// ─── INIT ─────────────────────────────────────────────────────
questionResults=[];
buildTabs();buildProgressBlocks();renderQuestion();renderHistory();
</script>
