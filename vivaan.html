<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivaan's Quiz Challenge! 🌟</title>

<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','GTM-N5BNNVFL');</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root{
  --bg:#0f0c29;--card:#1a1740;--accent:#f7c948;--green:#22d67a;--red:#ff5e5e;
  --blue:#4fc3f7;--purple:#b39ddb;--orange:#ff9f43;
  --beg:#4fc3f7;--pro:#ff5e5e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:white;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 15% 25%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 85% 15%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 45% 65%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 5% 85%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 95% 75%,rgba(255,255,255,.3) 0%,transparent 100%);pointer-events:none;z-index:0}
.wrapper{position:relative;z-index:1;max-width:840px;margin:0 auto;padding:16px 14px 100px}

/* Header */
.header{text-align:center;padding:20px 0 12px}
.header .crown{font-size:40px;animation:bounce 1.6s infinite;display:block}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.header h1{font-size:clamp(22px,5vw,36px);font-weight:900;letter-spacing:-1px;line-height:1.1}
.header h1 span{color:var(--accent)}
.header p{margin-top:5px;font-size:12px;color:#b0aed0}

/* Subject Tabs */
.subject-tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0 16px}
.sub-tab{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:50px;padding:8px 16px;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;color:#b0aed0;font-family:'Nunito',sans-serif}
.sub-tab:hover{background:rgba(247,201,72,.15);border-color:var(--accent);color:var(--accent)}
.sub-tab.active{border-color:var(--accent);color:#0f0c29;background:var(--accent)}
.sub-tab[data-sub="english"].active{background:#4fc3f7;border-color:#4fc3f7;color:#0f0c29}
.sub-tab[data-sub="evs"].active{background:#22d67a;border-color:#22d67a;color:#0f0c29}
.sub-tab[data-sub="gk"].active{background:#b39ddb;border-color:#b39ddb;color:#0f0c29}

/* Chapter Selector */
.chapter-section{margin-bottom:14px}
.chapter-section label{font-size:11px;font-weight:700;color:#8884b0;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;text-align:center}
.chapter-pills{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.ch-pill{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:12px;padding:8px 14px;font-size:12px;font-weight:800;cursor:pointer;transition:all .2s;color:#b0aed0;font-family:'Nunito',sans-serif;text-align:center}
.ch-pill:hover{background:rgba(247,201,72,.15);border-color:var(--accent);color:var(--accent)}
.ch-pill.active{background:var(--accent);border-color:var(--accent);color:#0f0c29}
.ch-pill .ch-num{font-size:10px;opacity:.7;display:block}

/* Level Toggle */
.level-section{display:flex;justify-content:center;gap:0;margin-bottom:14px;border-radius:50px;overflow:hidden;width:fit-content;margin-left:auto;margin-right:auto;border:2px solid rgba(255,255,255,.12)}
.level-btn{padding:9px 24px;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;color:#b0aed0;font-family:'Nunito',sans-serif;background:rgba(255,255,255,.05);border:none}
.level-btn.beginner.active{background:var(--beg);color:#0f0c29}
.level-btn.pro.active{background:var(--pro);color:white}
.level-btn:hover:not(.active){background:rgba(255,255,255,.1);color:white}

/* Level badge on card */
.level-badge{display:inline-flex;align-items:center;gap:4px;border-radius:50px;padding:3px 10px;font-size:11px;font-weight:800}
.level-badge.beginner{background:rgba(79,195,247,.2);border:1px solid rgba(79,195,247,.4);color:var(--beg)}
.level-badge.pro{background:rgba(255,94,94,.2);border:1px solid rgba(255,94,94,.4);color:var(--red)}

/* Set Tabs */
.set-tabs{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:0 0 14px}
.set-tab{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:50px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;color:#b0aed0;white-space:nowrap;font-family:'Nunito',sans-serif}
.set-tab:hover{background:rgba(247,201,72,.15);border-color:var(--accent);color:var(--accent)}
.set-tab.active{background:var(--accent);border-color:var(--accent);color:#0f0c29}
.set-tab.done{background:rgba(34,214,122,.15);border-color:var(--green);color:var(--green)}
.set-tab.done.active{background:var(--green);color:#0f0c29}

/* Timer */
.timer-bar{text-align:center;margin-bottom:12px}
.timer-display{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:5px 15px;font-size:15px;font-weight:900;color:var(--accent)}

/* Layout */
.page-layout{display:flex;gap:12px;align-items:flex-start}
.progress-sidebar{flex-shrink:0;width:42px;display:flex;flex-direction:column;gap:5px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:10px 5px}
.q-block{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:rgba(255,255,255,.3);transition:all .35s}
.q-block.current{border-color:var(--accent);color:var(--accent);animation:qpulse 1.2s infinite;background:rgba(247,201,72,.12)}
.q-block.correct{background:rgba(34,214,122,.25);border-color:var(--green);color:var(--green)}
.q-block.wrong{background:rgba(255,94,94,.25);border-color:var(--red);color:var(--red)}
@keyframes qpulse{0%,100%{box-shadow:0 0 0 0 rgba(247,201,72,.4)}50%{box-shadow:0 0 0 5px rgba(247,201,72,0)}}

/* Quiz card */
.quiz-area{flex:1;min-width:0}
.quiz-card{background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:22px 18px;margin-bottom:16px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.card-top-left .chapter-title{font-size:15px;font-weight:800;color:var(--accent);margin-bottom:3px}
.card-top-left .set-label{font-size:11px;color:#8884b0}
.live-score{display:inline-flex;align-items:center;gap:5px;background:rgba(34,214,122,.12);border:1px solid rgba(34,214,122,.3);border-radius:50px;padding:5px 12px;font-size:13px;font-weight:700;color:var(--green);flex-shrink:0}
.progress-bar-wrap{background:rgba(255,255,255,.08);border-radius:50px;height:7px;margin-bottom:18px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#ff9f43);border-radius:50px;transition:width .4s}

/* Topic tag */
.topic-tag{display:inline-block;background:rgba(179,157,219,.2);border:1px solid rgba(179,157,219,.3);border-radius:50px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--purple);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}

.q-counter{font-size:11px;font-weight:700;color:#8884b0;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.question-text{font-size:clamp(15px,3.5vw,20px);font-weight:800;line-height:1.5;margin-bottom:18px;min-height:52px}

/* Options */
.options{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.opt-btn{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:13px 9px;font-size:14px;font-weight:800;color:white;cursor:pointer;transition:all .2s;text-align:center;font-family:'Nunito',sans-serif;line-height:1.3}
.opt-btn:hover:not(:disabled){background:rgba(247,201,72,.15);border-color:var(--accent);transform:scale(1.03)}
.opt-btn.correct{background:rgba(34,214,122,.25);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(255,94,94,.2);border-color:var(--red);color:var(--red)}
.opt-btn:disabled{cursor:not-allowed}

/* Character panel — always visible */
.char-panel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.char-avatar{font-size:48px;line-height:1;transition:transform .3s}
.char-avatar.pop{animation:charPop .4s ease}
.char-avatar.shake{animation:charShake .5s ease}
@keyframes charPop{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes charShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.char-info{flex:1}
.char-name{font-size:11px;font-weight:700;color:#8884b0;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.char-emotion{font-size:17px;font-weight:900}
.char-emotion.correct-em{color:var(--green)}
.char-emotion.wrong-em{color:var(--red)}
.char-emotion.neutral-em{color:#b0aed0}
.char-msg{font-size:12px;color:#b0aed0;margin-top:2px;font-weight:600}

/* Feedback + Next */
.feedback{text-align:center;font-size:16px;font-weight:900;padding:9px 14px;border-radius:12px;margin-bottom:12px;display:none}
.feedback.show{display:block;animation:popIn .3s}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.feedback.correct-fb{background:rgba(34,214,122,.15);color:var(--green)}
.feedback.wrong-fb{background:rgba(255,94,94,.12);color:var(--red)}
.next-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#ff9f43);color:#0f0c29;font-size:15px;font-weight:900;border:none;border-radius:14px;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .15s;display:none}
.next-btn:hover{transform:translateY(-2px)}
.next-btn.show{display:block;animation:popIn .3s}

/* Result */
.result-screen{display:none;text-align:center;padding:10px 0}
.result-screen.show{display:block;animation:popIn .4s}
.result-char{font-size:60px;display:block;margin-bottom:8px;animation:bounce 1s infinite}
.result-trophy{font-size:52px;display:block;margin-bottom:8px}
.result-score{font-size:46px;font-weight:900;color:var(--accent);line-height:1}
.result-score .sub{font-size:17px;color:#b0aed0;font-weight:600}
.result-stars{font-size:26px;letter-spacing:4px;margin:10px 0}
.result-msg{font-size:16px;font-weight:700;margin-bottom:6px}
.result-time{font-size:12px;color:#8884b0;margin-bottom:16px}
.restart-btn{background:linear-gradient(135deg,var(--blue),#7986cb);color:white;border:none;border-radius:14px;padding:11px 26px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-right:8px}
.next-set-btn{background:linear-gradient(135deg,var(--green),#00b09b);color:white;border:none;border-radius:14px;padding:11px 26px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}

/* Floating Scoreboard Button */
.scoreboard-fab{position:fixed;bottom:22px;right:22px;z-index:100;background:linear-gradient(135deg,var(--accent),#ff9f43);color:#0f0c29;border:none;border-radius:50px;padding:11px 18px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 20px rgba(247,201,72,.4);display:flex;align-items:center;gap:7px;transition:transform .15s}
.scoreboard-fab:hover{transform:scale(1.05)}

/* Scoreboard Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal-box{background:#1a1740;border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:22px 18px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.1);border:none;color:white;border-radius:50%;width:30px;height:30px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif}
.modal-title{font-size:19px;font-weight:900;margin-bottom:14px;color:var(--accent)}
.modal-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.modal-filter-btn{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:50px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;color:#b0aed0;font-family:'Nunito',sans-serif;transition:all .2s}
.modal-filter-btn.active{background:var(--accent);border-color:var(--accent);color:#0f0c29}
.score-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 13px;margin-bottom:7px}
.sr-info .sr-label{font-size:13px;color:white;font-weight:700}
.sr-info .sr-sub{font-size:11px;color:#8884b0;margin-top:2px}
.sr-right{text-align:right}
.sr-score{font-size:18px;font-weight:900;color:var(--accent)}
.sr-stars{font-size:13px}
.score-row.perfect .sr-score{color:var(--green)}
.modal-empty{font-size:13px;color:#8884b0;text-align:center;padding:20px}
.modal-chapter-header{font-size:12px;font-weight:800;color:#8884b0;text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.08)}

/* Confetti */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}

/* "Coming Soon" chapter state */
.ch-pill.soon{opacity:.45;cursor:not-allowed}
.ch-pill.soon:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);color:#b0aed0}
.ch-pill .soon-tag{font-size:9px;background:rgba(255,255,255,.15);border-radius:4px;padding:1px 4px;margin-left:4px}

@media(max-width:560px){
  .page-layout{flex-direction:column}
  .progress-sidebar{width:100%;flex-direction:row;flex-wrap:wrap;padding:8px;gap:4px;justify-content:center}
  .q-block{width:28px;height:28px;font-size:9px}
  .options{grid-template-columns:1fr 1fr}
  .opt-btn{padding:10px 7px;font-size:13px}
  .quiz-card{padding:16px 12px}
  .level-btn{padding:8px 16px;font-size:12px}
}
</style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N5BNNVFL" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<canvas id="confetti-canvas"></canvas>

<div class="wrapper">

  <div class="header">
    <span class="crown">👑</span>
    <h1>Vivaan's <span>Quiz Challenge!</span></h1>
    <p>Mathematics Buzzz • Chapter-wise • Beginner &amp; Pro Levels</p>
  </div>

  <!-- Subject Tabs -->
  <div class="subject-tabs" id="subjectTabs">
    <button class="sub-tab active" data-sub="math" onclick="switchSubject('math')">🔢 Math</button>
    <button class="sub-tab" data-sub="english" onclick="switchSubject('english')">📖 English</button>
    <button class="sub-tab" data-sub="evs" onclick="switchSubject('evs')">🌿 EVS</button>
    <button class="sub-tab" data-sub="gk" onclick="switchSubject('gk')">🌍 GK</button>
  </div>

  <!-- Chapter Selector -->
  <div class="chapter-section">
    <label>Select Chapter</label>
    <div class="chapter-pills" id="chapterPills"></div>
  </div>

  <!-- Level Toggle -->
  <div class="level-section">
    <button class="level-btn beginner active" id="btnBeginner" onclick="switchLevel('beginner')">⭐ Beginner</button>
    <button class="level-btn pro" id="btnPro" onclick="switchLevel('pro')">🔥 Pro</button>
  </div>

  <!-- Set Tabs -->
  <div class="set-tabs" id="setTabs"></div>

  <!-- Timer -->
  <div class="timer-bar">
    <div class="timer-display">⏱ <span id="timerDisplay">0:00</span></div>
  </div>

  <div class="page-layout">
    <div class="progress-sidebar" id="progressSidebar"></div>

    <div class="quiz-area">
      <div class="quiz-card">
        <div class="card-top">
          <div class="card-top-left">
            <div class="chapter-title" id="cardChapterTitle"></div>
            <div class="set-label" id="cardSetLabel"></div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
            <div class="live-score">✅ <span id="liveScore">0</span> / <span id="totalQs">10</span></div>
            <div class="level-badge beginner" id="levelBadge">⭐ Beginner</div>
          </div>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

        <div id="quizBody">
          <div class="topic-tag" id="topicTag"></div>
          <div class="q-counter" id="qCounter">Question 1</div>
          <div class="question-text" id="questionText"></div>
          <div class="options" id="optionsGrid"></div>

          <!-- Character panel always visible -->
          <div class="char-panel" id="charPanel">
            <div class="char-avatar" id="charAvatar"></div>
            <div class="char-info">
              <div class="char-name" id="charName"></div>
              <div class="char-emotion neutral-em" id="charEmotion">Waiting for your answer...</div>
              <div class="char-msg" id="charMsg">Give it your best shot! 💪</div>
            </div>
          </div>

          <div class="feedback" id="feedback"></div>
          <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
        </div>

        <div class="result-screen" id="resultScreen">
          <span class="result-char" id="resChar"></span>
          <span class="result-trophy" id="resTrophy"></span>
          <div class="result-score">
            <span id="resScore">0</span><br>
            <span class="sub">out of <span id="resTotalQ">10</span></span>
          </div>
          <div class="result-stars" id="resStars"></div>
          <div class="result-msg" id="resMsg"></div>
          <div class="result-time" id="resTime"></div>
          <div>
            <button class="restart-btn" onclick="restartSet()">🔄 Try Again</button>
            <button class="next-set-btn" id="nextSetBtn" onclick="goNextSet()">Next Set →</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Floating Scoreboard Button -->
<button class="scoreboard-fab" onclick="openScoreboard()">🏆 Scores</button>

<!-- Scoreboard Modal -->
<div class="modal-overlay" id="scoreModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeScoreboard()">✕</button>
    <div class="modal-title">🏆 My Scores</div>
    <div class="modal-filters" id="modalFilters"></div>
    <div id="modalScoreList"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// QUESTION DATA
// Format: { q:"question", o:["CORRECT","w1","w2","w3"], a:0, topic:"topic label" }
// o[0] is always the correct answer; shuffled before display.
// ═══════════════════════════════════════════════════════

const CHAPTERS = {

  math: [
    {
      id: 'ch1',
      title: 'Numbers & Numeration',
      short: 'Ch 1',
      sets: {

        beginner: [

          // ── Beginner Set 1: Number Names, H/T/O, Abacus basics ──────
          [
            {topic:"Number Names", q:"What is the number name for 235?", o:["Two hundred and thirty-five","Two hundred and fifty-three","Twenty-three five","Two hundred fifty"], a:0},
            {topic:"Number Names", q:"Which number means 'Four hundred and twelve'?", o:["412","421","142","241"], a:0},
            {topic:"Number Names", q:"Write in digits: 'Seven hundred and nine'", o:["709","790","970","907"], a:0},
            {topic:"Hundreds Tens Ones", q:"In 367, the digit in the HUNDREDS place is?", o:["3","6","7","36"], a:0},
            {topic:"Hundreds Tens Ones", q:"In 845, how many TENS are there?", o:["4","8","5","84"], a:0},
            {topic:"Hundreds Tens Ones", q:"In 129, how many ONES are there?", o:["9","1","2","12"], a:0},
            {topic:"Hundreds Tens Ones", q:"5 hundreds + 0 tens + 9 ones = ?", o:["509","590","59","905"], a:0},
            {topic:"Abacus", q:"On an abacus: Hundreds=2, Tens=5, Ones=1. What number?", o:["251","215","512","125"], a:0},
            {topic:"Abacus", q:"On an abacus: Hundreds=4, Tens=0, Ones=7. What number?", o:["407","470","47","740"], a:0},

// ─── UTILS ─────────────────────────────────────────────────────
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}
function scoreKey(sub,chIdx,level,setIdx){return`vivaan_v4_${sub}_ch${chIdx}_${level}_set${setIdx}`;}

// ─── TIMER ─────────────────────────────────────────────────────
function startTimer(){
  clearInterval(timerInterval);timerSeconds=0;updateTimerDisplay();
  timerInterval=setInterval(()=>{timerSeconds++;updateTimerDisplay();},1000);
}
function stopTimer(){clearInterval(timerInterval);}
function updateTimerDisplay(){
  const m=Math.floor(timerSeconds/60),s=timerSeconds%60;
  document.getElementById('timerDisplay').textContent=`${m}:${s.toString().padStart(2,'0')}`;
}

// ─── GET CURRENT QUESTIONS ─────────────────────────────────────
function getCurrentQuestions(){
  const ch=CHAPTERS[currentSubject][currentChapterIdx];
  if(!ch)return[];
  return ch.sets[currentLevel][currentSetIdx]||[];
}

// ─── SUBJECT SWITCH ─────────────────────────────────────────────
function switchSubject(sub){
  currentSubject=sub;
  document.querySelectorAll('.sub-tab').forEach(t=>t.classList.toggle('active',t.dataset.sub===sub));
  currentChapterIdx=0;currentSetIdx=0;
  buildChapterPills();
  buildSetTabs();
  startQuiz();
}

// ─── LEVEL SWITCH ──────────────────────────────────────────────
function switchLevel(level){
  currentLevel=level;
  document.getElementById('btnBeginner').classList.toggle('active',level==='beginner');
  document.getElementById('btnPro').classList.toggle('active',level==='pro');
  const badge=document.getElementById('levelBadge');
  badge.className='level-badge '+level;
  badge.textContent=level==='beginner'?'⭐ Beginner':'🔥 Pro';
  currentSetIdx=0;
  buildSetTabs();
  startQuiz();
}

// ─── CHAPTER PILLS ─────────────────────────────────────────────
function buildChapterPills(){
  const el=document.getElementById('chapterPills');
  el.innerHTML='';
  const chapters=CHAPTERS[currentSubject];
  if(!chapters||chapters.length===0){
    el.innerHTML=`<div style="font-size:13px;color:#8884b0;text-align:center;padding:8px">${COMING_SOON_MSG}</div>`;
    return;
  }
  chapters.forEach((ch,i)=>{
    const btn=document.createElement('button');
    btn.className='ch-pill'+(i===currentChapterIdx?' active':'');
    btn.innerHTML=`<span class="ch-num">${ch.short}</span>${ch.title}`;
    btn.onclick=()=>{currentChapterIdx=i;currentSetIdx=0;buildChapterPills();buildSetTabs();startQuiz();};
    el.appendChild(btn);
  });
  // Placeholder for future chapters (show as coming soon)
  if(currentSubject==='math'){
    const comingSoon=[
      {short:'Ch 2',title:'Addition'},
      {short:'Ch 3',title:'Subtraction'},
      {short:'Ch 4',title:'Multiplication'},
      {short:'Ch 5',title:'Division'}
    ];
    comingSoon.forEach(ch=>{
      const btn=document.createElement('button');
      btn.className='ch-pill soon';
      btn.innerHTML=`<span class="ch-num">${ch.short}</span>${ch.title}<span class="soon-tag">Soon</span>`;
      btn.disabled=true;
      el.appendChild(btn);
    });
  }
}

// ─── SET TABS ──────────────────────────────────────────────────
function buildSetTabs(){
  const el=document.getElementById('setTabs');
  el.innerHTML='';
  const ch=CHAPTERS[currentSubject][currentChapterIdx];
  if(!ch)return;
  const sets=ch.sets[currentLevel];
  sets.forEach((s,i)=>{
    const key=scoreKey(currentSubject,currentChapterIdx,currentLevel,i);
    const saved=localStorage.getItem(key);
    const btn=document.createElement('button');
    btn.className='set-tab'+(i===currentSetIdx?' active':'')+(saved?' done':'');
    btn.textContent=`Set ${i+1}${saved?(' ✓'):''}`;
    btn.onclick=()=>{currentSetIdx=i;buildSetTabs();startQuiz();};
    el.appendChild(btn);
  });
}

// ─── START QUIZ ────────────────────────────────────────────────
function startQuiz(){
  currentQ=0;score=0;answered=false;
  const qs=getCurrentQuestions();
  questionResults=new Array(qs.length).fill(null);
  currentChar=CHARS[Math.floor(Math.random()*CHARS.length)];
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizBody').style.display='block';
  document.getElementById('totalQs').textContent=qs.length;
  document.getElementById('resTotalQ').textContent=qs.length;
  const ch=CHAPTERS[currentSubject][currentChapterIdx];
  document.getElementById('cardChapterTitle').textContent=ch?`${ch.short}: ${ch.title}`:'';
  document.getElementById('cardSetLabel').textContent=`${currentLevel==='beginner'?'⭐ Beginner':'🔥 Pro'} · Set ${currentSetIdx+1} of ${ch?ch.sets[currentLevel].length:0}`;
  buildSidebar(qs.length);
  renderQuestion();
  startTimer();
  document.getElementById('liveScore').textContent='0';
  document.getElementById('progressBar').style.width='0%';
  setCharNeutral();
  // Show/hide next-set button
  const ch2=CHAPTERS[currentSubject][currentChapterIdx];
  const hasNext=ch2&&(currentSetIdx<ch2.sets[currentLevel].length-1);
  document.getElementById('nextSetBtn').style.display=hasNext?'':'none';
}

// ─── SIDEBAR ───────────────────────────────────────────────────
function buildSidebar(total){
  const el=document.getElementById('progressSidebar');
  el.innerHTML='';
  for(let i=0;i<total;i++){
    const b=document.createElement('div');
    b.className='q-block'+(i===0?' current':'');
    b.id=`qb${i}`;b.textContent=i+1;
    el.appendChild(b);
  }
}
function updateSidebar(){
  const total=getCurrentQuestions().length;
  for(let i=0;i<total;i++){
    const b=document.getElementById(`qb${i}`);if(!b)continue;
    b.className='q-block';
    if(questionResults[i]==='correct')b.classList.add('correct');
    else if(questionResults[i]==='wrong')b.classList.add('wrong');
    else if(i===currentQ)b.classList.add('current');
  }
}

// ─── RENDER QUESTION ───────────────────────────────────────────
function renderQuestion(){
  const qs=getCurrentQuestions();
  const q=qs[currentQ];
  answered=false;
  const total=qs.length;
  document.getElementById('qCounter').textContent=`Question ${currentQ+1} of ${total}`;
  document.getElementById('questionText').textContent=q.q;
  document.getElementById('topicTag').textContent=q.topic||'';
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='next-btn';
  updateSidebar();

  const correct=q.o[q.a];
  const shuffled=shuffle(q.o);
  const correctIdx=shuffled.indexOf(correct);

  const grid=document.getElementById('optionsGrid');
  grid.innerHTML='';
  shuffled.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=opt;
    btn.onclick=()=>answer(btn,i===correctIdx,shuffled,correctIdx);
    grid.appendChild(btn);
  });

  setCharNeutral();
}

// ─── ANSWER ────────────────────────────────────────────────────
function answer(btn,isCorrect,shuffled,correctIdx){
  if(answered)return;
  answered=true;
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  btns[correctIdx].classList.add('correct');
  const fb=document.getElementById('feedback');
  const qs=getCurrentQuestions();
  const total=qs.length;
  if(isCorrect){
    btn.classList.add('correct');
    score++;
    questionResults[currentQ]='correct';
    fb.className='feedback correct-fb show';
    fb.textContent='✅ Correct! Brilliant!';
    setCharHappy();
  } else {
    btn.classList.add('wrong');
    questionResults[currentQ]='wrong';
    fb.className='feedback wrong-fb show';
    fb.textContent=`❌ Oops! Answer: ${shuffled[correctIdx]}`;
    setCharSad();
  }
  document.getElementById('liveScore').textContent=score;
  document.getElementById('progressBar').style.width=`${((currentQ+1)/total)*100}%`;
  updateSidebar();
  document.getElementById('nextBtn').className='next-btn show';
}

function nextQuestion(){
  const total=getCurrentQuestions().length;

  else showResult();

  document.getElementById('resTime').textContent=`Time: ${min}m ${sec}s`;
  document.getElementById('resMsg').textContent=
    pct>=90?`GENIUS! ${currentChar.name} is in awe! 🌟`:
    pct>=70?`Great job! ${currentChar.name} is proud! 🎉`:
    `Keep practising! ${currentChar.name} believes in you! 💪`;
  if(pct>=90)launchConfetti();
}

function restartSet(){
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizBody').style.display='block';
  startQuiz();
}
function goNextSet(){
  currentSetIdx++;
  buildSetTabs();
  startQuiz();
}

// ─── SCOREBOARD ────────────────────────────────────────────────
function openScoreboard(){
  modalSubject=currentSubject;modalLevel=currentLevel;
  renderModalFilters();
  renderModalScores();
  document.getElementById('scoreModal').classList.add('show');
}
function closeScoreboard(){document.getElementById('scoreModal').classList.remove('show');}

function renderModalFilters(){
  const f=document.getElementById('modalFilters');
  f.innerHTML='';
  ['math','english','evs','gk'].forEach(s=>{
    const b=document.createElement('button');
    b.className='modal-filter-btn'+(s===modalSubject?' active':'');
    b.textContent=SUBJECT_LABELS[s];
    b.onclick=()=>{modalSubject=s;renderModalFilters();renderModalScores();};
    f.appendChild(b);
  });
  ['beginner','pro'].forEach(l=>{
    const b=document.createElement('button');
    b.className='modal-filter-btn'+(l===modalLevel?' active':'');
    b.textContent=l==='beginner'?'⭐ Beginner':'🔥 Pro';
    b.style.borderColor=l==='beginner'?'rgba(79,195,247,.4)':'rgba(255,94,94,.4)';
    if(l===modalLevel)b.style.background=l==='beginner'?'var(--beg)':'var(--red)';
    b.onclick=()=>{modalLevel=l;renderModalFilters();renderModalScores();};
    f.appendChild(b);
  });
}

function renderModalScores(){
  const list=document.getElementById('modalScoreList');
  list.innerHTML='';
  const chapters=CHAPTERS[modalSubject];
  if(!chapters||chapters.length===0){
    list.innerHTML=`<div class="modal-empty">${COMING_SOON_MSG}</div>`;return;
  }
  let found=false;
  chapters.forEach((ch,chIdx)=>{
    const sets=ch.sets[modalLevel];
    const savedSets=sets.map((_,si)=>{
      const key=scoreKey(modalSubject,chIdx,modalLevel,si);
      const raw=localStorage.getItem(key);
      return raw?JSON.parse(raw):null;
    }).filter(Boolean);
    if(savedSets.length===0)return;
    found=true;
    const header=document.createElement('div');
    header.className='modal-chapter-header';
    header.textContent=`${ch.short}: ${ch.title}`;
    list.appendChild(header);
    sets.forEach((_,si)=>{
      const key=scoreKey(modalSubject,chIdx,modalLevel,si);
      const raw=localStorage.getItem(key);
      if(!raw)return;
      const data=JSON.parse(raw);
      const stars=data.pct>=90?'⭐⭐⭐':data.pct>=70?'⭐⭐':'⭐';
      const row=document.createElement('div');
      row.className='score-row'+(data.pct>=90?' perfect':'');
      const min=Math.floor(data.time/60),sec=data.time%60;
      row.innerHTML=`<div class="sr-info"><div class="sr-label">Set ${si+1}</div><div class="sr-sub">${min}m ${sec}s</div></div><div class="sr-right"><div class="sr-score">${data.score}/${data.total}</div><div class="sr-stars">${stars}</div></div>`;
      list.appendChild(row);
    });
  });
  if(!found)list.innerHTML='<div class="modal-empty">No scores yet — start quizzing! 🚀</div>';
}

// ─── CONFETTI ──────────────────────────────────────────────────
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=Array.from({length:120},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,r:Math.random()*6+3,c:`hsl(${Math.random()*360},90%,60%)`,vx:(Math.random()-.5)*4,vy:Math.random()*5+2,a:Math.random()*360}));
  let frames=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a*Math.PI/180);
      ctx.fillStyle=p.c;ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.a+=3;
      if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}
    });
    if(frames++<200)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ─── INIT ──────────────────────────────────────────────────────
document.getElementById('scoreModal').addEventListener('click',function(e){if(e.target===this)closeScoreboard();});
buildChapterPills();
buildSetTabs();
startQuiz();
</script>
