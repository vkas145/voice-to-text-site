<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivaan's Math Challenge! 🧠⚡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  :root {
    --bg: #0f0c29;
    --card: #1a1740;
    --accent: #f7c948;
    --green: #22d67a;
    --red: #ff5e5e;
    --blue: #4fc3f7;
    --purple: #b39ddb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: white;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 90%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 40%, rgba(255,255,255,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 20px 16px 60px; }

  /* Header */
  .header { text-align: center; padding: 32px 0 24px; }
  .header .crown { font-size: 52px; animation: bounce 1.5s infinite; display: block; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .header h1 { font-size: clamp(28px,6vw,42px); font-weight:900; letter-spacing:-1px; line-height:1.1; }
  .header h1 span { color: var(--accent); }
  .header p { margin-top:8px; font-size:15px; color:#b0aed0; }

  /* Day tabs */
  .day-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 24px 0 20px; }
  .day-tab {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 50px;
    padding: 8px 16px;
    font-size: 13px; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: #b0aed0;
    white-space: nowrap;
  }
  .day-tab:hover { background: rgba(247,201,72,0.15); border-color: var(--accent); color: var(--accent); }
  .day-tab.active { background: var(--accent); border-color: var(--accent); color: #0f0c29; }
  .day-tab.done { background: rgba(34,214,122,0.15); border-color: var(--green); color: var(--green); }
  .day-tab.done.active { background: var(--green); color: #0f0c29; }

  /* Quiz card */
  .quiz-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 28px 24px;
    margin-bottom: 24px;
  }

  .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .day-title { font-size: 20px; font-weight: 800; color: var(--accent); }
  .day-meta { font-size: 13px; color: #8884b0; }

  .progress-bar-wrap { background: rgba(255,255,255,0.08); border-radius: 50px; height: 10px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #ff9f43); border-radius: 50px; transition: width 0.4s; }

  /* Question */
  .q-counter { font-size: 12px; font-weight: 700; color: #8884b0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .question-text {
    font-size: clamp(18px,4vw,26px);
    font-weight: 800;
    line-height: 1.4;
    margin-bottom: 24px;
    min-height: 64px;
  }
  .question-emoji { font-size: 32px; display: block; margin-bottom: 8px; }

  /* Answer options */
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .opt-btn {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 16px 12px;
    font-size: 18px; font-weight: 800;
    color: white;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-family: 'Nunito', sans-serif;
  }
  .opt-btn:hover:not(:disabled) { background: rgba(247,201,72,0.15); border-color: var(--accent); transform: scale(1.03); }
  .opt-btn.correct { background: rgba(34,214,122,0.25); border-color: var(--green); color: var(--green); }
  .opt-btn.wrong { background: rgba(255,94,94,0.2); border-color: var(--red); color: var(--red); }
  .opt-btn:disabled { cursor: not-allowed; }

  /* Feedback */
  .feedback {
    text-align: center; font-size: 22px; font-weight: 900;
    padding: 12px 20px; border-radius: 14px; margin-bottom: 16px;
    display: none;
  }
  .feedback.show { display: block; animation: popIn 0.3s; }
  @keyframes popIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
  .feedback.correct-fb { background: rgba(34,214,122,0.15); color: var(--green); }
  .feedback.wrong-fb { background: rgba(255,94,94,0.12); color: var(--red); }

  .next-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--accent), #ff9f43);
    color: #0f0c29; font-size: 17px; font-weight: 900;
    border: none; border-radius: 16px; cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: transform 0.15s, box-shadow 0.15s;
    display: none;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(247,201,72,0.35); }
  .next-btn.show { display: block; animation: popIn 0.3s; }

  /* Result screen */
  .result-screen { display: none; text-align: center; padding: 12px 0; }
  .result-screen.show { display: block; animation: popIn 0.4s; }
  .result-trophy { font-size: 72px; display: block; margin-bottom: 12px; }
  .result-score { font-size: 56px; font-weight: 900; color: var(--accent); line-height: 1; }
  .result-score span { font-size: 22px; color: #b0aed0; font-weight: 600; }
  .result-msg { font-size: 20px; font-weight: 700; margin: 12px 0 20px; }
  .result-stars { font-size: 36px; letter-spacing: 4px; margin-bottom: 20px; }
  .restart-btn {
    background: linear-gradient(135deg, var(--blue), #7986cb);
    color: white; border: none; border-radius: 16px;
    padding: 14px 32px; font-size: 16px; font-weight: 800;
    cursor: pointer; font-family: 'Nunito', sans-serif;
    transition: transform 0.15s;
  }
  .restart-btn:hover { transform: translateY(-2px); }

  /* Score History */
  .history-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 24px;
    margin-top: 8px;
  }
  .history-card h2 { font-size: 20px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .history-empty { font-size: 14px; color: #8884b0; text-align: center; padding: 20px; }

  .score-row {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 10px;
  }
  .score-row .sr-date { font-size: 14px; color: #b0aed0; font-weight: 600; }
  .score-row .sr-day { font-size: 13px; color: #8884b0; margin-top: 2px; }
  .score-row .sr-score { font-size: 22px; font-weight: 900; color: var(--accent); }
  .score-row .sr-stars { font-size: 18px; letter-spacing: 2px; }
  .score-row .sr-pct { font-size: 12px; color: #8884b0; }
  .score-row.perfect .sr-score { color: var(--green); }

  /* Confetti canvas */
  #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

  /* Medal badge */
  .live-score {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(34,214,122,0.12);
    border: 1px solid rgba(34,214,122,0.3);
    border-radius: 50px; padding: 5px 14px;
    font-size: 14px; font-weight: 700; color: var(--green);
  }

  @media (max-width: 480px) {
    .options { grid-template-columns: 1fr 1fr; }
    .opt-btn { padding: 14px 8px; font-size: 16px; }
    .quiz-card { padding: 20px 16px; }
  }
</style>
</head>

      <div class="feedback" id="feedback"></div>

    </div>

    <!-- Result screen -->
    <div class="result-screen" id="resultScreen">
      <span class="result-trophy" id="resTrophy">🏆</span>
      <div class="result-score"><span id="resScore">0</span><br><span>out of 20</span></div>

      <div class="result-msg" id="resMsg"></div>
      <button class="restart-btn" onclick="restartDay()">🔄 Try Again</button>

  </div>

  <!-- Score History -->
  <div class="history-card">

    <div id="historyList"></div>

function getDates() {
  const dates = [];
  const now = new Date();
  // Use today as Day 1 (UTC-safe)
  const base = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  for (let i = 0; i < 7; i++) {
    const d = new Date(base);
    d.setDate(base.getDate() + i);
    dates.push(d);
  }
  return dates;
}

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ─── STATE ────────────────────────────────────────────────────
let currentDay = 0;
let currentQ = 0;
let score = 0;
let answered = false;

// ─── LOCALSTORAGE ─────────────────────────────────────────────
function storageKey(dayIdx) { return 'vivaan_score_' + dateKey(DATES[dayIdx]); }
function getScore(dayIdx) { const v = localStorage.getItem(storageKey(dayIdx)); return v !== null ? parseInt(v) : null; }
function saveScore(dayIdx, s) { localStorage.setItem(storageKey(dayIdx), String(s)); }

// ─── BUILD TABS ───────────────────────────────────────────────
function buildTabs() {
  const wrap = document.getElementById('dayTabs');
  wrap.innerHTML = '';
  DATES.forEach((d, i) => {
    const tab = document.createElement('button');
    const saved = getScore(i);
    const isToday = i === 0;
    tab.className = 'day-tab' + (i === currentDay ? ' active' : '') + (saved !== null ? ' done' : '');
    tab.innerHTML = `${isToday ? '📅 ' : ''}${DAY_NAMES[d.getDay()].slice(0,3)}<br><small>${d.getDate()} ${MONTH_NAMES[d.getMonth()]}</small>`;
    tab.style.lineHeight = '1.3';
    tab.onclick = () => switchDay(i);
    wrap.appendChild(tab);
  });
}

// ─── SWITCH DAY ───────────────────────────────────────────────
function switchDay(idx) {
  currentDay = idx;
  currentQ = 0; score = 0; answered = false;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizBody').style.display = '';
  document.getElementById('liveScore').textContent = '0';
  buildTabs();
  renderQuestion();
}

// ─── RENDER QUESTION ──────────────────────────────────────────
function renderQuestion() {
  const qs = QUESTION_SETS[currentDay];
  const q = qs[currentQ];
  answered = false;

  document.getElementById('qCounter').textContent = `Question ${currentQ + 1} of ${qs.length}`;
  document.getElementById('questionText').innerHTML = `<span class="question-emoji">${q.emoji}</span>${q.text}`;

  const pct = (currentQ / qs.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';

  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';

  const nb = document.getElementById('nextBtn');
  nb.className = 'next-btn';

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';

  // Shuffle options but track correct answer
  const idxArr = [0,1,2,3];
  // We keep options in original order for simplicity (answer is always index 0 in data)
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.dataset.idx = i;
    btn.onclick = () => checkAnswer(i, q.answer);
    grid.appendChild(btn);
  });

  // Update day info
  document.getElementById('dayTitle').textContent = `Day ${currentDay + 1} — ${['Addition & Subtraction 🎉','Multiplication Magic ✨','Word Problems 📚','Division & Fractions 🍕','Patterns & Place Value 🔢','Time, Money & Measurement 📏','Super Brain Boss Level 🧠⚡'][currentDay]}`;
  document.getElementById('dayMeta').textContent = fmtDate(DATES[currentDay]);
}

// ─── CHECK ANSWER ─────────────────────────────────────────────
function checkAnswer(selected, correct) {
  if (answered) return;
  answered = true;

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);
  btns[correct].classList.add('correct');

  const fb = document.getElementById('feedback');
  const nb = document.getElementById('nextBtn');

  if (selected === correct) {
    score++;
    document.getElementById('liveScore').textContent = score;
    btns[selected].classList.add('correct');
    const msgs = ['🎉 Brilliant!','⚡ Superstar!','🔥 Nailed it!','🌟 Genius!','🚀 Correct!','💡 Smart!'];
    fb.textContent = msgs[Math.floor(Math.random() * msgs.length)];
    fb.className = 'feedback correct-fb show';
  } else {
    btns[selected].classList.add('wrong');
    fb.textContent = `❌ Oops! The answer was ${QUESTION_SETS[currentDay][currentQ].options[correct]}`;
    fb.className = 'feedback wrong-fb show';
  }

  const qs = QUESTION_SETS[currentDay];
  nb.className = 'next-btn show';
  nb.textContent = currentQ < qs.length - 1 ? 'Next Question →' : 'See My Score! 🏆';
}

// ─── NEXT QUESTION ────────────────────────────────────────────
function nextQuestion() {
  const qs = QUESTION_SETS[currentDay];
  currentQ++;
  if (currentQ >= qs.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ─── SHOW RESULT ──────────────────────────────────────────────
function showResult() {
  saveScore(currentDay, score);

  document.getElementById('quizBody').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.classList.add('show');

  document.getElementById('progressBar').style.width = '100%';

  const pct = score / 20;
  let trophy, msg, stars;
  if (score === 20)      { trophy='🏆'; msg='PERFECT! You are a Math GOD! 🧠⚡'; stars='⭐⭐⭐⭐⭐'; }
  else if (pct >= 0.9)   { trophy='🥇'; msg='Outstanding! Almost perfect! 🔥'; stars='⭐⭐⭐⭐⭐'; }
  else if (pct >= 0.75)  { trophy='🥈'; msg='Great job! Keep pushing! 💪'; stars='⭐⭐⭐⭐'; }
  else if (pct >= 0.6)   { trophy='🥉'; msg='Good effort! Practice makes perfect! 📚'; stars='⭐⭐⭐'; }
  else                   { trophy='💪'; msg='Keep trying! You\'ve got this! 🚀'; stars='⭐⭐'; }

  document.getElementById('resTrophy').textContent = trophy;
  document.getElementById('resScore').textContent = score;
  document.getElementById('resStars').textContent = stars;
  document.getElementById('resMsg').textContent = msg;

  if (pct >= 0.9) launchConfetti();

  buildTabs();
  renderHistory();
}

// ─── RESTART ─────────────────────────────────────────────────
function restartDay() {
  currentQ = 0; score = 0; answered = false;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizBody').style.display = '';
  document.getElementById('liveScore').textContent = '0';
  renderQuestion();
}

// ─── HISTORY ─────────────────────────────────────────────────
function renderHistory() {
  const list = document.getElementById('historyList');
  let html = '';
  let any = false;
  DATES.forEach((d, i) => {
    const s = getScore(i);
    if (s === null) return;
    any = true;
    const pct = Math.round((s / 20) * 100);
    const stars = s === 20 ? '⭐⭐⭐⭐⭐' : s >= 18 ? '⭐⭐⭐⭐⭐' : s >= 15 ? '⭐⭐⭐⭐' : s >= 12 ? '⭐⭐⭐' : '⭐⭐';
    html += `<div class="score-row${s===20?' perfect':''}">
      <div>
        <div class="sr-date">${fmtDate(d)} &nbsp;<span style="opacity:.5">·</span>&nbsp; ${DAY_NAMES[d.getDay()]}</div>
        <div class="sr-day">Day ${i+1}</div>
      </div>
      <div style="text-align:right">
        <div class="sr-score">${s} / 20</div>
        <div class="sr-pct">${pct}%</div>
        <div class="sr-stars">${stars}</div>
      </div>
    </div>`;
  });
  list.innerHTML = any ? html : '<div class="history-empty">No scores yet — complete a quiz to see results here! 🎯</div>';
}

// ─── CONFETTI ─────────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -200,
    r: Math.random() * 8 + 4,
    c: `hsl(${Math.random()*360},90%,60%)`,
    vx: (Math.random()-0.5)*4,
    vy: Math.random()*4+2,
    rot: Math.random()*360,
    rv: (Math.random()-0.5)*6,
  }));

  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.rot += p.rv;
    });
    frame++;
    if (frame < 120) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ─── INIT ─────────────────────────────────────────────────────
buildTabs();
renderQuestion();
renderHistory();
</script>
