<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root{--bg:#0f0c29;--card:#1a1740;--accent:#f7c948;--green:#22d67a;--red:#ff5e5e;--blue:#4fc3f7;--purple:#b39ddb;--orange:#ff9f43}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:white;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 15% 25%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 85% 15%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 45% 65%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 5% 85%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 95% 75%,rgba(255,255,255,.3) 0%,transparent 100%);pointer-events:none;z-index:0}
.wrapper{position:relative;z-index:1;max-width:840px;margin:0 auto;padding:16px 14px 90px}

/* Header */
.header{text-align:center;padding:22px 0 14px}
.header .crown{font-size:42px;animation:bounce 1.6s infinite;display:block}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.header h1{font-size:clamp(24px,5vw,38px);font-weight:900;letter-spacing:-1px;line-height:1.1}
.header h1 span{color:var(--accent)}
.header p{margin-top:5px;font-size:13px;color:#b0aed0}

/* Subject Tabs */
.subject-tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0 18px}
.sub-tab{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:50px;padding:9px 18px;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;color:#b0aed0;font-family:'Nunito',sans-serif}
.sub-tab:hover{background:rgba(247,201,72,.15);border-color:var(--accent);color:var(--accent)}
.sub-tab.active{border-color:var(--accent);color:#0f0c29;background:var(--accent)}
.sub-tab[data-sub="english"].active{background:#4fc3f7;border-color:#4fc3f7;color:#0f0c29}
.sub-tab[data-sub="evs"].active{background:#22d67a;border-color:#22d67a;color:#0f0c29}
.sub-tab[data-sub="gk"].active{background:#b39ddb;border-color:#b39ddb;color:#0f0c29}

/* Day tabs */
.day-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:0 0 14px}
.day-tab{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:50px;padding:6px 13px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;color:#b0aed0;white-space:nowrap;font-family:'Nunito',sans-serif}
.day-tab:hover{background:rgba(247,201,72,.15);border-color:var(--accent);color:var(--accent)}
.day-tab.active{background:var(--accent);border-color:var(--accent);color:#0f0c29}
.day-tab.done{background:rgba(34,214,122,.15);border-color:var(--green);color:var(--green)}
.day-tab.done.active{background:var(--green);color:#0f0c29}

/* Timer */
.timer-bar{text-align:center;margin-bottom:12px}
.timer-display{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:6px 16px;font-size:16px;font-weight:900;color:var(--accent)}

/* Layout */
.page-layout{display:flex;gap:12px;align-items:flex-start}
.progress-sidebar{flex-shrink:0;width:42px;display:flex;flex-direction:column;gap:5px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:10px 5px}
.q-block{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:rgba(255,255,255,.3);transition:all .35s}
.q-block.current{border-color:var(--accent);color:var(--accent);animation:qpulse 1.2s infinite;background:rgba(247,201,72,.12)}
.q-block.correct{background:rgba(34,214,122,.25);border-color:var(--green);color:var(--green)}
.q-block.wrong{background:rgba(255,94,94,.25);border-color:var(--red);color:var(--red)}
@keyframes qpulse{0%,100%{box-shadow:0 0 0 0 rgba(247,201,72,.4)}50%{box-shadow:0 0 0 5px rgba(247,201,72,0)}}

/* Quiz card */
.quiz-area{flex:1;min-width:0}
.quiz-card{background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:22px 18px;margin-bottom:16px}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.day-title{font-size:16px;font-weight:800;color:var(--accent)}
.day-meta{font-size:11px;color:#8884b0;margin-top:2px}
.live-score{display:inline-flex;align-items:center;gap:5px;background:rgba(34,214,122,.12);border:1px solid rgba(34,214,122,.3);border-radius:50px;padding:5px 12px;font-size:13px;font-weight:700;color:var(--green)}
.progress-bar-wrap{background:rgba(255,255,255,.08);border-radius:50px;height:7px;margin-bottom:18px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#ff9f43);border-radius:50px;transition:width .4s}
.q-counter{font-size:11px;font-weight:700;color:#8884b0;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.question-text{font-size:clamp(15px,3.5vw,21px);font-weight:800;line-height:1.45;margin-bottom:18px;min-height:56px}

/* Options */
.options{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.opt-btn{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:13px 9px;font-size:15px;font-weight:800;color:white;cursor:pointer;transition:all .2s;text-align:center;font-family:'Nunito',sans-serif}
.opt-btn:hover:not(:disabled){background:rgba(247,201,72,.15);border-color:var(--accent);transform:scale(1.03)}
.opt-btn.correct{background:rgba(34,214,122,.25);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(255,94,94,.2);border-color:var(--red);color:var(--red)}
.opt-btn:disabled{cursor:not-allowed}

/* Character panel — ALWAYS visible */
.char-panel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:13px 16px;margin-bottom:13px;display:flex;align-items:center;gap:12px}
.char-avatar{font-size:50px;line-height:1;transition:transform .3s}
.char-avatar.pop{animation:charPop .4s ease}
.char-avatar.shake{animation:charShake .5s ease}
@keyframes charPop{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes charShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.char-info{flex:1}
.char-name{font-size:11px;font-weight:700;color:#8884b0;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.char-emotion{font-size:18px;font-weight:900}
.char-emotion.correct-em{color:var(--green)}
.char-emotion.wrong-em{color:var(--red)}
.char-emotion.neutral-em{color:#b0aed0}
.char-msg{font-size:12px;color:#b0aed0;margin-top:2px;font-weight:600}

/* Feedback + Next */
.feedback{text-align:center;font-size:17px;font-weight:900;padding:9px 14px;border-radius:12px;margin-bottom:12px;display:none}
.feedback.show{display:block;animation:popIn .3s}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.feedback.correct-fb{background:rgba(34,214,122,.15);color:var(--green)}
.feedback.wrong-fb{background:rgba(255,94,94,.12);color:var(--red)}
.next-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#ff9f43);color:#0f0c29;font-size:15px;font-weight:900;border:none;border-radius:14px;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .15s;display:none}
.next-btn:hover{transform:translateY(-2px)}
.next-btn.show{display:block;animation:popIn .3s}

/* Result */
.result-screen{display:none;text-align:center;padding:10px 0}
.result-screen.show{display:block;animation:popIn .4s}
.result-char{font-size:64px;display:block;margin-bottom:8px;animation:bounce 1s infinite}
.result-trophy{font-size:56px;display:block;margin-bottom:8px}
.result-score{font-size:48px;font-weight:900;color:var(--accent);line-height:1}
.result-score span{font-size:18px;color:#b0aed0;font-weight:600}
.result-stars{font-size:28px;letter-spacing:4px;margin:10px 0}
.result-msg{font-size:17px;font-weight:700;margin-bottom:16px}
.restart-btn{background:linear-gradient(135deg,var(--blue),#7986cb);color:white;border:none;border-radius:14px;padding:11px 26px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}

/* Floating Scoreboard Button */
.scoreboard-fab{position:fixed;bottom:22px;right:22px;z-index:100;background:linear-gradient(135deg,var(--accent),#ff9f43);color:#0f0c29;border:none;border-radius:50px;padding:12px 20px;font-size:15px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 20px rgba(247,201,72,.4);display:flex;align-items:center;gap:7px;transition:transform .15s}
.scoreboard-fab:hover{transform:scale(1.05)}

/* Scoreboard Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal-box{background:#1a1740;border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:24px 20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.1);border:none;color:white;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-title{font-size:20px;font-weight:900;margin-bottom:16px;color:var(--accent)}
.modal-sub-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.modal-sub-tab{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:50px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;color:#b0aed0;font-family:'Nunito',sans-serif;transition:all .2s}
.modal-sub-tab.active{background:var(--accent);border-color:var(--accent);color:#0f0c29}
.score-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 14px;margin-bottom:8px}
.sr-date{font-size:13px;color:#b0aed0;font-weight:600}
.sr-day{font-size:11px;color:#8884b0;margin-top:2px}
.sr-score{font-size:19px;font-weight:900;color:var(--accent)}
.sr-stars{font-size:14px}
.score-row.perfect .sr-score{color:var(--green)}
.history-empty{font-size:13px;color:#8884b0;text-align:center;padding:20px}

/* Confetti */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}

@media(max-width:560px){
  .page-layout{flex-direction:column}
  .progress-sidebar{width:100%;flex-direction:row;flex-wrap:wrap;padding:8px;gap:4px;justify-content:center}
  .q-block{width:28px;height:28px;font-size:9px}
  .options{grid-template-columns:1fr 1fr}
  .opt-btn{padding:11px 7px;font-size:13px}
  .quiz-card{padding:16px 12px}
}
</style>
</head>

// ─── CHARACTERS ────────────────────────────────────────────────
const CHARS=[
  {name:"Paddington Bear",emoji:"🐻",happyMsgs:["Paw-some! 🐻🎉","Honey-sweet correct! 🍯","Un-bear-ably smart!"],sadMsgs:["Even bears slip! 🐾","Shake it off, champ!","Next one — paws crossed!"]},
  {name:"Jerry Mouse",emoji:"🐭",happyMsgs:["Squeaky genius! 🐭✨","Jerry approves! 🧀","You outsmarted everyone!"],sadMsgs:["Jerry says try again!","Even I get chased! 🐭","Cheese will come! 🧀"]},
  {name:"Tom Cat",emoji:"🐱",happyMsgs:["Purr-fect! 🐱🎊","Tom is impressed! ✨","Meow-nificent!"],sadMsgs:["Hiss! Close one! 😾","Tom says read again!","Land on all fours! 🐱"]},
  {name:"Masha",emoji:"👧",happyMsgs:["Masha shouts YES! 👧🎉","Smart as Masha!","Dancing time! 💃"],sadMsgs:["Masha says: don't worry!","Try again — Masha believes!","We all make mistakes! 👧"]},
  {name:"Simba",emoji:"🦁",happyMsgs:["ROAR! Correct! 🦁👑","Pride Lands cheer for you!","Remember who you are! 🌟"],sadMsgs:["Even Simba learns! 🦁","Hakuna Matata — next one!","Keep going, future king!"]},
  {name:"Super Vivaan",emoji:"🦸",happyMsgs:["SUPERHERO move! 🦸⚡","Vivaan saves the day!","Cape ON, brain BLAZING! 🌟"],sadMsgs:["Even heroes have off days!","Power UP and retry! 🦸","You've got this, hero! ⚡"]}
];

const SUBJECT_LABELS={math:"🔢 Math",english:"📖 English",evs:"🌿 EVS",gk:"🌍 GK"};

// ─── STATE ─────────────────────────────────────────────────────
let currentSubject='math';
let currentDayIdx=0;
let currentQ=0;
let score=0;
let answered=false;
let questionResults=[];
let currentChar=null;
let timerInterval=null;
let timerSeconds=0;
let modalSubject='math';

// ─── UTILS ─────────────────────────────────────────────────────
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}

// ─── TIMER ─────────────────────────────────────────────────────
function startTimer(){
  clearInterval(timerInterval);
  timerSeconds=0;
  updateTimerDisplay();
  timerInterval=setInterval(()=>{timerSeconds++;updateTimerDisplay();},1000);
}
function stopTimer(){clearInterval(timerInterval);}
function updateTimerDisplay(){
  const m=Math.floor(timerSeconds/60);
  const s=timerSeconds%60;
  document.getElementById('timerDisplay').textContent=`${m}:${s.toString().padStart(2,'0')}`;
}

// ─── SUBJECT SWITCH ─────────────────────────────────────────────
function switchSubject(sub){
  currentSubject=sub;
  document.querySelectorAll('.sub-tab').forEach(t=>t.classList.toggle('active',t.dataset.sub===sub));
  currentDayIdx=0;
  buildDayTabs();
  startDay();
}

// ─── DAY TABS ─────────────────────────────────────────────────
function buildDayTabs(){
  const el=document.getElementById('dayTabs');
  el.innerHTML='';
  DATES.forEach((d,i)=>{
    const key=dateKey(currentSubject,d);
    const saved=localStorage.getItem(key);
    const btn=document.createElement('button');
    btn.className='day-tab'+(i===currentDayIdx?' active':'')+(saved?' done':'');
    btn.textContent=`${fmtDate(d)}`;
    btn.onclick=()=>selectDay(i);
    el.appendChild(btn);
  });
}

function selectDay(i){
  currentDayIdx=i;
  document.querySelectorAll('.day-tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  startDay();
}

// ─── START DAY ─────────────────────────────────────────────────
function startDay(){
  currentQ=0;score=0;answered=false;
  questionResults=new Array(20).fill(null);
  currentChar=CHARS[Math.floor(Math.random()*CHARS.length)];
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizBody').style.display='block';
  buildSidebar();
  renderQuestion();
  startTimer();
  document.getElementById('liveScore').textContent='0';
  document.getElementById('progressBar').style.width='0%';
  document.getElementById('dayTitle').textContent=SUBJECT_LABELS[currentSubject];
  document.getElementById('dayMeta').textContent=fmtDate(DATES[currentDayIdx]);
  // Reset character to neutral
  setCharNeutral();
}

// ─── SIDEBAR ───────────────────────────────────────────────────
function buildSidebar(){
  const el=document.getElementById('progressSidebar');
  el.innerHTML='';
  for(let i=0;i<20;i++){
    const b=document.createElement('div');
    b.className='q-block'+(i===0?' current':'');
    b.id=`qb${i}`;
    b.textContent=i+1;
    el.appendChild(b);
  }
}

function updateSidebar(){
  for(let i=0;i<20;i++){
    const b=document.getElementById(`qb${i}`);
    if(!b)continue;
    b.className='q-block';
    if(questionResults[i]==='correct')b.classList.add('correct');
    else if(questionResults[i]==='wrong')b.classList.add('wrong');
    else if(i===currentQ)b.classList.add('current');
  }
}

// ─── RENDER QUESTION ───────────────────────────────────────────
function renderQuestion(){
  const qs=ALL_QUESTIONS[currentSubject][currentDayIdx];
  const q=qs[currentQ];
  answered=false;
  document.getElementById('qCounter').textContent=`Question ${currentQ+1} of 20`;
  document.getElementById('questionText').textContent=q.q;
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').textContent='';
  document.getElementById('nextBtn').className='next-btn';
  updateSidebar();

  const correct=q.o[q.a];
  const shuffled=shuffle(q.o);
  const newCorrectIdx=shuffled.indexOf(correct);

  const grid=document.getElementById('optionsGrid');
  grid.innerHTML='';
  shuffled.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=opt;
    btn.onclick=()=>answer(btn,i===newCorrectIdx,shuffled,newCorrectIdx);
    grid.appendChild(btn);
  });

  setCharNeutral();
}

// ─── ANSWER ────────────────────────────────────────────────────
function answer(btn,isCorrect,shuffled,correctIdx){
  if(answered)return;
  answered=true;
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  btns[correctIdx].classList.add('correct');

  const fb=document.getElementById('feedback');

  if(isCorrect){
    btn.classList.add('correct');
    score++;
    questionResults[currentQ]='correct';
    fb.className='feedback correct-fb show';
    fb.textContent='✅ Correct! Well done!';
    setCharHappy();
  } else {
    btn.classList.add('wrong');
    questionResults[currentQ]='wrong';
    fb.className='feedback wrong-fb show';
    fb.textContent=`❌ Oops! Correct: ${shuffled[correctIdx]}`;
    setCharSad();
  }

  document.getElementById('liveScore').textContent=score;
  document.getElementById('progressBar').style.width=`${((currentQ+1)/20)*100}%`;
  updateSidebar();
  document.getElementById('nextBtn').className='next-btn show';
}

// ─── CHARACTER ─────────────────────────────────────────────────
function setCharNeutral(){
  const av=document.getElementById('charAvatar');
  av.textContent=currentChar.emoji;
  av.className='char-avatar';
  document.getElementById('charName').textContent=currentChar.name;
  document.getElementById('charEmotion').className='char-emotion neutral-em';
  document.getElementById('charEmotion').textContent='Waiting for your answer...';
  document.getElementById('charMsg').textContent='Go on, give it your best shot! 💪';
}

function setCharHappy(){
  const av=document.getElementById('charAvatar');
  av.textContent=currentChar.emoji;
  av.className='char-avatar pop';
  document.getElementById('charEmotion').className='char-emotion correct-em';
  document.getElementById('charEmotion').textContent='🎉 Amazing!';
  document.getElementById('charMsg').textContent=rand(currentChar.happyMsgs);
}

function setCharSad(){
  const av=document.getElementById('charAvatar');
  av.textContent=currentChar.emoji;
  av.className='char-avatar shake';
  document.getElementById('charEmotion').className='char-emotion wrong-em';
  document.getElementById('charEmotion').textContent='😔 Oh no...';
  document.getElementById('charMsg').textContent=rand(currentChar.sadMsgs);
}

// ─── NEXT QUESTION ─────────────────────────────────────────────
function nextQuestion(){
  if(currentQ<19){
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

// ─── RESULT ────────────────────────────────────────────────────
function showResult(){
  stopTimer();
  const pct=Math.round((score/20)*100);
  // Save score
  const key=dateKey(currentSubject,DATES[currentDayIdx]);
  localStorage.setItem(key,JSON.stringify({score,pct,time:timerSeconds,date:fmtDate(DATES[currentDayIdx])}));
  // Update day tab
  buildDayTabs();

  document.getElementById('quizBody').style.display='none';
  const rs=document.getElementById('resultScreen');
  rs.classList.add('show');
  document.getElementById('resChar').textContent=currentChar.emoji;
  document.getElementById('resTrophy').textContent=pct>=90?'🏆':pct>=70?'🥈':'🥉';
  document.getElementById('resScore').textContent=score;
  const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  document.getElementById('resStars').textContent=stars;
  const msgs={90:`GENIUS! ${currentChar.name} is in awe! 🌟`,70:`Great job! ${currentChar.name} is proud! 🎉`,0:`Keep practising! ${currentChar.name} believes in you! 💪`};
  document.getElementById('resMsg').textContent=pct>=90?msgs[90]:pct>=70?msgs[70]:msgs[0];

  if(pct>=90)launchConfetti();
}

function restartDay(){
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizBody').style.display='block';
  startDay();
}

// ─── SCOREBOARD MODAL ──────────────────────────────────────────
function openScoreboard(){
  modalSubject=currentSubject;
  document.querySelectorAll('.modal-sub-tab').forEach(t=>t.classList.toggle('active',t.dataset.sub===modalSubject));
  renderModalScores();
  document.getElementById('scoreModal').classList.add('show');
}
function closeScoreboard(){document.getElementById('scoreModal').classList.remove('show');}
function showModalSub(sub){
  modalSubject=sub;
  document.querySelectorAll('.modal-sub-tab').forEach(t=>t.classList.toggle('active',t.dataset.sub===sub));
  renderModalScores();
}
function renderModalScores(){
  const list=document.getElementById('modalScoreList');
  list.innerHTML='';
  let found=false;
  DATES.forEach(d=>{
    const key=dateKey(modalSubject,d);
    const raw=localStorage.getItem(key);
    if(!raw)return;
    found=true;
    const data=JSON.parse(raw);
    const row=document.createElement('div');
    row.className='score-row'+(data.pct>=90?' perfect':'');
    const stars=data.pct>=90?'⭐⭐⭐':data.pct>=70?'⭐⭐':'⭐';
    row.innerHTML=`<div><div class="sr-date">${fmtDate(d)}</div></div><div style="text-align:right"><div class="sr-score">${data.score}/20</div><div class="sr-stars">${stars}</div></div>`;
    list.appendChild(row);
  });
  if(!found)list.innerHTML='<div class="history-empty">No scores yet — start quizzing! 🚀</div>';
}

// ─── CONFETTI ──────────────────────────────────────────────────
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=Array.from({length:120},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,r:Math.random()*6+3,c:`hsl(${Math.random()*360},90%,60%)`,vx:(Math.random()-0.5)*4,vy:Math.random()*5+2,a:Math.random()*360}));
  let frames=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a*Math.PI/180);
      ctx.fillStyle=p.c;ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.a+=3;
      if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}
    });
    if(frames++<200)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ─── INIT ──────────────────────────────────────────────────────
document.getElementById('scoreModal').addEventListener('click',function(e){if(e.target===this)closeScoreboard();});
buildDayTabs();
startDay();
</script>
