<script>
  async function upload() {
    const fileInput = document.getElementById("audioFile");
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");

    if (!fileInput.files.length) {
      alert("Please upload an audio file");
      return;
    }

    // Convert file to base64
    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async function () {
      const base64 = reader.result.split(",")[1]; // strip the data:audio/...;base64, prefix

      loading.style.display = "block";
      result.innerText = "";

      const response = await fetch("/.netlify/functions/analyze", {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: base64  // send raw base64 string
      });

      const data = await response.json();
      loading.style.display = "none";

      if (data.error) {
        result.innerText = "Error: " + data.error;
      } else {
        result.innerText = data.text;  // ← your function returns "text" not "transcript"
      }
    };

    reader.readAsDataURL(file); // triggers onload with base64
  }
</script>
