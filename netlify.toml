[functions]
  node_bundler = "esbuild"

[functions."analyze"]
  timeout = 120

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# Clean URLs for SEO pages
[[redirects]]
  from = "/audio-to-text"
  to = "/audio-to-text.html"
  status = 200

