[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"

[functions."analyze"]
  timeout = 26

[functions."send-otp"]
  timeout = 10

[functions."verify-otp"]
  timeout = 10

[[redirects]]
  from = "/vivaan"
  to = "/vivaan.html"
  status = 200
  force = true

[[redirects]]
  from = "/vivaan/*"
  to = "/vivaan.html"
  status = 200
  force = true
